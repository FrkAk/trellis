name: Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    # Keep PG_IMAGE in sync with the tag used by tests/setup/container.ts.
    env:
      PG_IMAGE: postgres:17.6
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
        if: github.actor != 'dependabot[bot]'
      - name: Install dependencies (Dependabot)
        run: bun install
        if: github.actor == 'dependabot[bot]'
      - name: Validate PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -Pq '^(feat|fix|chore|docs|refactor|test|ci|perf|style|build|revert)(\(.+\))?!?: .+'; then
            echo "::error::PR title must follow conventional commits: <type>: <description>"
            echo "  Types: feat, fix, chore, docs, refactor, test, ci, perf, style, build, revert"
            echo "  Examples: 'feat: add task graph', 'fix(ai): rate limiter timing'"
            exit 1
          fi
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Cache Postgres test container image
        id: pg-cache
        uses: actions/cache@v4
        with:
          path: /tmp/postgres-image.tar
          key: docker-image-${{ env.PG_IMAGE }}
      - name: Load Postgres image from cache
        if: steps.pg-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/postgres-image.tar
      - name: Pull and save Postgres image
        if: steps.pg-cache.outputs.cache-hit != 'true'
        run: |
          docker pull "$PG_IMAGE"
          docker save "$PG_IMAGE" -o /tmp/postgres-image.tar
      - name: Test
        run: bun run test
      - name: Check plugin drift
        run: bun run check:plugins
